<!--
  Reference: X/Twitter post card (dark theme)
  Copy and adapt the .post-card section into your generated HTML.
  Replace placeholder content with scraped data.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  .post-card {
    background: #16181c;
    border: 1px solid #2f3336;
    border-radius: 24px;
    padding: 32px;
    max-width: 600px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .card-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
  .avatar { width: 64px; height: 64px; border-radius: 50%; }
  .user-info { display: flex; flex-direction: column; flex: 1; }
  .name-row { display: flex; align-items: center; gap: 6px; }
  .display-name { font-weight: 700; font-size: 22px; color: #e7e9ea; }
  .username { font-size: 18px; color: #71767b; }
  .x-logo { margin-left: auto; font-size: 28px; font-weight: 800; color: #e7e9ea; }

  /* X verified badge — inline SVG, blue checkmark */
  .verified-badge { width: 24px; height: 24px; flex-shrink: 0; }

  .post-text {
    font-size: 24px; line-height: 1.6; color: #e7e9ea;
    white-space: pre-line; margin-bottom: 20px;
  }
  .post-time {
    font-size: 18px; color: #71767b;
    padding-bottom: 20px; border-bottom: 1px solid #2f3336; margin-bottom: 20px;
  }
  .post-time .views { color: #e7e9ea; font-weight: 700; }
  .post-stats { display: flex; gap: 32px; }
  .stat { font-size: 18px; color: #71767b; }
  .stat b { color: #e7e9ea; }
</style>
</head>
<body>
